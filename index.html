<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<!-- هذا السطر هو السر في منع تدوير الشاشة وجعل التطبيق ثابتاً ومريحاً على الجوال -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Denis Protokoll</title>

<!-- إضافة الأيقونة الخاصة بك كما طلبت -->
<link rel="icon" href="icon.png.PNG">
<link rel="apple-touch-icon" href="icon.png.PNG">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #E8394A; --red2: #ff6b7a; --green: #4cba6b;
  --bg: #f5f0eb; --card: #ffffff; --border: #E2E5EC;
  --text: #141518; --muted: #8890A0; --row-hover: #fff8f8;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); min-height: 100vh;
  /* تقليل الهوامش لتناسب عرض الجوال */
  padding: 10px 8px 60px;
  -webkit-print-color-adjust: exact; print-color-adjust: exact;
}

/* تحسين البطاقة لتكون مرنة 100% مع الشاشة */
.card { 
  position: relative; 
  z-index: 1; 
  max-width: 900px; 
  margin: 0 auto; 
  background: var(--card); 
  border-radius: 15px; 
  box-shadow: 0 8px 40px rgba(0,0,0,0.09); 
  overflow: hidden; /* يمنع خروج المحتوى */
}

/* جعل رأس الصفحة (Header) عمودياً في الجوال ليوفر مساحة */
@media (max-width: 600px) {
  .card-header { flex-direction: column; align-items: flex-start !important; gap: 15px !important; }
  .header-right { align-items: flex-start !important; width: 100%; }
  .header-meta-fields { flex-direction: column; width: 100%; }
  .meta-field-input { width: 100% !important; }
  .header-selects { width: 100%; justify-content: space-between; }
  
  /* تصغير أعمدة الجدول لتناسب الوضع الطولي */
  .col-headers, .proto-row { 
    grid-template-columns: 80px 55px 55px 1fr !important; 
    gap: 3px !important; 
    padding: 8px 5px !important;
  }
  .header-title { font-size: 16px !important; }
  .btn { padding: 7px 12px; font-size: 11px; }
}

.card-header { background: linear-gradient(135deg, #4a6080 0%, #3d5268 100%); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 800; color: white; }
.header-title span { color: #ffb3b9; }

.toolbar { max-width: 900px; margin: 0 auto 10px; display: flex; justify-content: space-between; align-items: center; }
.toolbar-brand { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; }

.col-headers { display: grid; grid-template-columns: 120px 70px 70px 1fr; gap: 6px; padding: 8px 14px; background: #eee; }
.col-tag { font-size: 9px; font-weight: 700; text-align: center; text-transform: uppercase; color: #666; }

.rows-wrap { display: flex; flex-direction: column; }
.proto-row { display: grid; grid-template-columns: 120px 70px 70px 1fr; gap: 6px; padding: 6px 14px; border-bottom: 1px solid var(--border); align-items: center; }

.cell { border: 1px solid var(--border); border-radius: 8px; padding: 2px; min-height: 40px; display: flex; align-items: center; justify-content: center; background: white; }
.time-input-direct { width: 100%; border: none; font-size: 11px; text-align: center; font-weight: bold; outline: none; }
.notiz-select { width: 100%; border: none; font-size: 10px; outline: none; background: transparent; }

.add-zone { padding: 20px; display: flex; justify-content: center; gap: 10px; }
.btn-red { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
.btn-ghost { background: white; border: 1.2px solid var(--border); padding: 8px 15px; border-radius: 10px; cursor: pointer; }

/* إخفاء بعض العناصر عند الطباعة */
@media print {
  .no-print { display: none !important; }
  .card { box-shadow: none; border: 1px solid #ccc; }
}
</style>
</head>
<body>

<div class="toolbar no-print">
  <div class="toolbar-brand">Denis <span>Protokoll</span></div>
  <div class="toolbar-right">
    <button class="btn-ghost" onclick="resetForm()">↺ Reset</button>
    <button class="btn-red" onclick="window.print()">🖨 PDF</button>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="header-left">
      <div class="header-title">Denis <span>Protokoll</span></div>
      <div style="color: rgba(255,255,255,0.6); font-size: 10px; margin-top: 5px;" id="liveClock">00:00:00</div>
    </div>
    <div class="header-right">
      <div class="header-meta-fields">
        <input class="meta-field-input" type="text" id="mitarbeiterName" placeholder="Mitarbeiter Name" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:5px; border-radius:5px; font-size:11px;">
      </div>
      <div class="header-selects" style="margin-top:5px; display:flex; gap:5px;">
        <input class="date-input" type="date" id="dateInput" style="font-size:10px; padding:3px; border-radius:5px; border:none;">
      </div>
    </div>
  </div>

  <div class="col-headers">
    <div class="col-tag">Kunde</div>
    <div class="col-tag">Beginn</div>
    <div class="col-tag">Ende</div>
    <div class="col-tag">Notiz</div>
  </div>

  <div class="rows-wrap" id="rowsWrap">
    <!-- الأسطر سيتم إنشاؤها بواسطة JavaScript -->
  </div>

  <div class="add-zone no-print">
    <button class="btn-red" onclick="addRow()">＋ Zeile hinzufügen</button>
  </div>
</div>

<script>
// تحديد الوقت والتاريخ التلقائي
const today = new Date();
document.getElementById('dateInput').value = today.toISOString().split('T')[0];

function addRow() {
  const wrap = document.getElementById('rowsWrap');
  const id = Date.now();
  const div = document.createElement('div');
  div.className = 'proto-row';
  div.innerHTML = `
    <div class="cell"><input type="text" placeholder="Kunde" style="width:100%; border:none; font-size:10px; padding:5px;"></div>
    <div class="cell"><input type="time" class="time-input-direct"></div>
    <div class="cell"><input type="time" class="time-input-direct"></div>
    <div class="cell">
      <select class="notiz-select">
        <option>Regulär</option>
        <option>Obdachlose entfernt</option>
        <option>Polizei gerufen</option>
        <option>Vandalismus</option>
        <option>Freitext...</option>
      </select>
    </div>
  `;
  wrap.appendChild(div);
}

// إضافة 8 أسطر عند البدء
for(let i=0; i<8; i++) addRow();

function resetForm() {
  if(confirm('Alles löschen?')) {
    document.getElementById('rowsWrap').innerHTML = '';
    for(let i=0; i<8; i++) addRow();
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
</script>
</body>
</html>
