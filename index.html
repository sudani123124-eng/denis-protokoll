<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Denis Protokoll</title>

<link rel="icon" href="icon.png.PNG">
<link rel="apple-touch-icon" href="icon.png.PNG">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #E8394A; --bg: #f5f0eb; --card: #ffffff; --border: #E2E5EC;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); padding: 10px 8px;
}
.card { 
  max-width: 900px; margin: 0 auto; background: var(--card); 
  border-radius: 15px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); overflow: hidden; 
}
.card-header { 
  background: linear-gradient(135deg, #4a6080 0%, #3d5268 100%); 
  padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center;
}
.header-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
.header-title span { color: #ffb3b9; }

.col-headers, .proto-row { 
  display: grid; grid-template-columns: 80px 60px 60px 1fr; 
  gap: 4px; padding: 10px; border-bottom: 1px solid var(--border);
}
.col-tag { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; text-align: center; }
.cell { border: 1px solid var(--border); border-radius: 6px; min-height: 35px; display: flex; align-items: center; justify-content: center; }
.time-input { width: 100%; border: none; font-size: 11px; text-align: center; outline: none; font-weight: bold; }
input[type="text"] { width: 100%; border: none; font-size: 10px; padding: 5px; outline: none; }

.add-zone { padding: 20px; text-align: center; }
.btn-red { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

@media (max-width: 480px) {
    .header-title { font-size: 15px; }
    .col-headers, .proto-row { grid-template-columns: 70px 50px 50px 1fr; padding: 5px; }
}
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="header-title">Denis <span>Protokoll</span></div>
    <div id="liveClock" style="font-size: 11px;">00:00:00</div>
  </div>

  <div style="padding: 10px; display: flex; gap: 10px; background: #f9f9f9;">
    <input type="text" id="mitarbeiterName" placeholder="Mitarbeiter" style="border: 1px solid #ddd; border-radius: 5px; padding: 5px;">
    <input type="date" id="dateInput" style="border: 1px solid #ddd; border-radius: 5px; font-size: 11px; padding: 5px;">
  </div>

  <div class="col-headers">
    <div class="col-tag">Kunde</div>
    <div class="col-tag">Von</div>
    <div class="col-tag">Bis</div>
    <div class="col-tag">Notiz</div>
  </div>

  <div id="rowsWrap"></div>

  <div class="add-zone">
    <button class="btn-red" onclick="addRow()">＋ Zeile hinzufügen</button>
    <button onclick="window.print()" style="margin-left:10px; padding: 10px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer;">🖨 PDF</button>
  </div>
</div>

<script>
const today = new Date();
document.getElementById('dateInput').value = today.toISOString().split('T')[0];

function addRow() {
  const wrap = document.getElementById('rowsWrap');
  const div = document.createElement('div');
  div.className = 'proto-row';
  div.innerHTML = `
    <div class="cell"><input type="text" placeholder="Standort"></div>
    <div class="cell"><input type="time" class="time-input"></div>
    <div class="cell"><input type="time" class="time-input"></div>
    <div class="cell"><input type="text" placeholder="Ereignis"></div>
  `;
  wrap.appendChild(div);
}

for(let i=0; i<5; i++) addRow();

function updateClock() {
  document.getElementById('liveClock').textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
</script>
</body>
</html>
